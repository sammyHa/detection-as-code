name: Test Detections (Phase 3)

# Trigger on PRs that modify detection content. Runs on the lab self-hosted
# runner because we need direct network access to Proxmox, the victim VM,
# and Splunk's management API.

on:
  pull_request:
    paths:
      - 'detections/**'
      - 'tests/atomics/atomic_mapping.yml'
      - 'tools/orchestrator/**'
      - '.github/workflows/test-detections.yml'
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run every detection in the mapping (nightly mode)'
        required: false
        default: false
        type: boolean
      detection_timeout_sec:
        description: 'Per-detection SLA in seconds'
        required: false
        default: '300'
        type: string

# Only one run at a time — atomic detonation is not safe to parallelize on
# a single victim VM. Newer PR pushes cancel earlier in-flight runs.
concurrency:
  group: detonation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  identify_changes:
    name: Identify changed detections
    runs-on: ubuntu-latest
    outputs:
      detection_ids: ${{ steps.find.outputs.detection_ids }}
      count: ${{ steps.find.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history for diff

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: pip install pyyaml

      - id: find
        name: Find changed detections
        run: |
          if [ "${{ inputs.run_all }}" = "true" ]; then
            ids=$(python tools/orchestrator/changed_detections.py --all)
          else
            ids=$(python tools/orchestrator/changed_detections.py \
              --base origin/${{ github.event.pull_request.base.ref || 'main' }} \
              --head HEAD)
          fi
          echo "detection_ids=$ids" >> "$GITHUB_OUTPUT"
          count=$(echo "$ids" | python -c 'import json,sys; print(len(json.load(sys.stdin)))')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count detection(s) to test: $ids"

  convert:
    name: Convert Sigma → SPL (for orchestrator)
    runs-on: ubuntu-latest
    needs: identify_changes
    if: needs.identify_changes.outputs.count != '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Convert all rules (we need the SPL for any rule that might be tested)
        run: python tools/sigma_convert.py --source detections/ --output build/ --target splunk

      - name: Upload SPL build
        uses: actions/upload-artifact@v4
        with:
          name: splunk-build
          path: build/splunk/
          retention-days: 7

  detonate:
    name: Detonate atomics & assert detection
    runs-on: self-hosted
    needs: [identify_changes, convert]
    if: needs.identify_changes.outputs.count != '0'
    environment: lab-detonation  # require manual approval for the first PRs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime deps
        run: pip install pyyaml requests pywinrm

      - name: Download SPL build
        uses: actions/download-artifact@v4
        with:
          name: splunk-build
          path: build/splunk/

      - name: Run orchestrator
        env:
          # Proxmox
          PROXMOX_HOST: ${{ secrets.PROXMOX_HOST }}
          PROXMOX_NODE: ${{ secrets.PROXMOX_NODE }}
          PROXMOX_TOKEN_USER: ${{ secrets.PROXMOX_TOKEN_USER }}
          PROXMOX_TOKEN_SECRET: ${{ secrets.PROXMOX_TOKEN_SECRET }}
          PROXMOX_VERIFY_TLS: 'false'
          # Victim VM
          VICTIM_HOST: ${{ secrets.VICTIM_HOST }}
          VICTIM_USER: ${{ secrets.VICTIM_USER }}
          VICTIM_PASSWORD: ${{ secrets.VICTIM_PASSWORD }}
          VICTIM_VMID: ${{ secrets.VICTIM_VMID }}
          WINRM_TRANSPORT: ntlm
          # Splunk
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_PORT: ${{ secrets.SPLUNK_PORT }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: |
          python tools/orchestrator/run_detonation.py \
            --detection-ids '${{ needs.identify_changes.outputs.detection_ids }}' \
            --build-dir build/splunk \
            --report phase3-report.json \
            --detection-timeout ${{ inputs.detection_timeout_sec || '300' }}

      - name: Format PR comment
        if: always()
        run: |
          python tools/orchestrator/format_pr_comment.py phase3-report.json > phase3-comment.md
          cat phase3-comment.md >> $GITHUB_STEP_SUMMARY

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-report
          path: |
            phase3-report.json
            phase3-comment.md
          retention-days: 30

      - name: Post results to PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: phase3-comment.md
          header: phase3-detection-validation

  no_changes:
    name: No detection changes
    runs-on: ubuntu-latest
    needs: identify_changes
    if: needs.identify_changes.outputs.count == '0'
    steps:
      - run: |
          echo "## ⚪ Phase 3 — Detection Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No detection rules changed in this PR. No detonation runs were executed." >> $GITHUB_STEP_SUMMARY
