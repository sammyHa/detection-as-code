name: Deploy Detections

on:
  push:
    branches: [main]
    paths:
      - 'detections/**'
      - 'tools/sigma_convert.py'
      - 'tools/deploy_splunk.py'
      - 'tools/deploy_elastic.py'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - splunk
          - elastic
      dry_run:
        description: 'Dry run only'
        required: true
        default: false
        type: boolean

jobs:
  convert:
    name: Convert Sigma → SPL + EQL
    runs-on: ubuntu-latest
    outputs:
      rule_count: ${{ steps.count.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Convert all detections
        run: python tools/sigma_convert.py --source detections/ --output build/

      - name: Count rules
        id: count
        run: echo "count=$(ls build/splunk/*.conf 2>/dev/null | wc -l)" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: detection-builds
          path: build/
          retention-days: 30

  deploy_splunk:
    name: Deploy to Splunk (lab)
    runs-on: self-hosted   # runs on the lab self-hosted runner
    needs: convert
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.target == 'splunk' || inputs.target == 'both'))
    environment: lab-splunk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime deps
        run: pip install requests pyyaml

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: detection-builds
          path: build/

      - name: Deploy to lab Splunk
        env:
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_PORT: ${{ secrets.SPLUNK_PORT }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: |
          python tools/deploy_splunk.py \
            --build-dir build/splunk \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}

  deploy_elastic:
    name: Deploy to Elastic (lab)
    runs-on: self-hosted
    needs: convert
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.target == 'elastic' || inputs.target == 'both'))
    environment: lab-elastic
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime deps
        run: pip install requests pyyaml

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: detection-builds
          path: build/

      - name: Deploy to lab Elastic
        env:
          KIBANA_URL: ${{ secrets.KIBANA_URL }}
          ELASTIC_API_KEY: ${{ secrets.ELASTIC_API_KEY }}
        run: |
          python tools/deploy_elastic.py \
            --build-dir build/elastic \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}

  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [convert, deploy_splunk, deploy_elastic]
    if: always()
    steps:
      - run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Convert | ${{ needs.convert.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Splunk  | ${{ needs.deploy_splunk.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Elastic | ${{ needs.deploy_elastic.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Rules processed: ${{ needs.convert.outputs.rule_count }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
