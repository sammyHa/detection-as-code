      test_name: "DCSync (Active Directory)"
      platform: windows
      elevation: admin
      expected_alert: "DCSync Domain Replication"

- detection_id: 9b3e7c5a-8f24-4d91-a6b3-2c5e9f1d4a86
  detection_path: detections/windows/defense_evasion/T1218.011_rundll32_suspicious_execution.yml
